<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow</title>
    <style>
        :root {
            --bg: #05070a; --card: #11141d; --accent: #38bdf8;
            --deposit: #10b981; --withdraw: #ef4444; --empty: #1e293b; 
            --overheat: #a855f7; --text-dim: #94a3b8; --danger: #f59e0b;
        }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', system-ui, sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        .nav-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 420px; background: rgba(17, 20, 29, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px; border: 1px solid #334155; border-radius: 25px; z-index: 1000; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .nav-item { color: var(--text-dim); cursor: pointer; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; transition: 0.3s; padding: 10px 15px; border-radius: 15px; }
        .nav-item.active { color: var(--accent); background: rgba(56, 189, 248, 0.15); }
        
        .page { display: none; animation: slideUp 0.3s ease-out; } 
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .header-card { text-align: center; background: radial-gradient(circle at top right, #1e293b, #11141d); padding: 40px 20px; border-radius: 40px; margin-bottom: 25px; border: 1px solid #1e293b; }
        .balance-val { font-size: 5rem; font-weight: 900; margin: 0; letter-spacing: -4px; line-height: 1; }
        .progress-container { height: 12px; background: var(--empty); border-radius: 10px; margin: 30px 0; overflow: hidden; position: relative; }
        #fill-bar { height: 100%; width: 50%; transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1); border-radius: 10px; }

        .insight-box { background: rgba(15, 23, 42, 0.6); padding: 18px; border-radius: 20px; font-size: 0.85rem; border-left: 4px solid var(--accent); min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 4px; }
        .status-label { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }
        .status-desc { color: #f8fafc; opacity: 0.8; font-size: 0.8rem; margin-top: 2px; }

        .card { background: var(--card); padding: 25px; border-radius: 35px; border: 1px solid #1e293b; margin-bottom: 25px; }
        input, select, button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 18px; border: none; background: #1c2331; color: white; font-size: 1rem; box-sizing: border-box; }
        .btn-main { background: var(--accent); color: #000; font-weight: 900; cursor: pointer; border-bottom: 5px solid #0ea5e9; text-transform: uppercase; letter-spacing: 1px; }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #f87171; font-weight: 800; border: 1px solid rgba(239, 68, 68, 0.2); margin-top: 20px; }

        .date-shifter { display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 15px 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .shift-btn { background: #1c2331; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 900; border: 1px solid #334155; }

        .timeline-box { background: var(--card); border-radius: 35px; padding: 10px; border: 1px solid #1e293b; }
        .hour-row { display: flex; height: 45px; align-items: center; border-bottom: 1px solid #0f172a; }
        .h-time { width: 55px; font-size: 0.65rem; color: var(--text-dim); font-weight: 800; padding-left: 10px; }
        .h-block { flex-grow: 1; height: 34px; border-radius: 10px; background: #05070a; display: flex; align-items: center; padding-left: 12px; font-size: 0.7rem; font-weight: 600; border: 1px solid #1e293b; overflow: hidden; white-space: nowrap; margin-right: 5px; }
        .fill-deposit { background: rgba(16, 185, 129, 0.15); border-color: var(--deposit); color: var(--deposit); }
        .fill-withdraw { background: rgba(239, 68, 68, 0.15); border-color: var(--withdraw); color: var(--withdraw); }

        .pie-container { width: 220px; height: 220px; border-radius: 50%; margin: 30px auto; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5); background: var(--empty); }
        .pie-hole { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; background: var(--card); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; color: white; text-align: center; font-weight: 900; line-height: 1.4; }
        .legend-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        label { font-size: 0.65rem; font-weight: 900; color: var(--text-dim); text-transform: uppercase; display: block; margin-bottom: 4px; padding-left: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="page-dash" class="page active">
            <div class="header-card">
                <h3 style="margin:0; color:var(--text-dim); font-size: 0.75rem; letter-spacing: 2px;">FOCUS BALANCE</h3>
                <div class="balance-val" id="disp-bal">0</div>
                <div class="progress-container">
                    <div id="fill-bar"></div>
                </div>
                <div id="insight-display" class="insight-box">
                    <span class="status-label">Analyzing</span>
                    <span class="status-desc">Calculating flow...</span>
                </div>
            </div>

            <div class="card">
                <h3 style="margin:0 0 15px 0;">Log Activity</h3>
                <select id="sel-act"></select>
                
                <div class="input-grid">
                    <div><label>Start</label><input type="time" id="start-time"></div>
                    <div><label>Hrs</label><input type="number" id="dur-hrs" value="1" min="0"></div>
                    <div><label>Mins</label><input type="number" id="dur-mins" value="0" min="0" max="59" step="15"></div>
                </div>
                <button class="btn-main" onclick="executeLog()">Commit to Flow</button>
            </div>
        </div>

        <div id="page-day" class="page">
            <div class="date-shifter">
                <div class="shift-btn" onclick="changeDay(-1)">←</div>
                <div id="day-date-label" style="font-weight:900; font-size: 0.95rem;"></div>
                <div class="shift-btn" onclick="changeDay(1)">→</div>
            </div>
            <div class="timeline-box" id="timeline-list"></div>
        </div>

        <div id="page-reports" class="page">
            <h2 style="margin-left:15px;">Analytics</h2>
            <div class="card">
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="date" id="range-from" style="margin:0; font-size:0.8rem;">
                    <input type="date" id="range-to" style="margin:0; font-size:0.8rem;" onchange="renderReports()">
                </div>
                <div class="pie-container" id="pie-chart"><div class="pie-hole" id="pie-center-text">Data</div></div>
                <div id="pie-legend"></div>
            </div>
        </div>

        <div id="page-settings" class="page">
            <h2 style="margin-left:15px;">Settings</h2>
            <div class="card">
                <input type="text" id="in-name" placeholder="Activity Name">
                <input type="number" id="in-rate" placeholder="Points / Hour">
                <select id="in-cat"><option value="deposit">Build</option><option value="withdraw">Drain</option></select>
                <button class="btn-main" onclick="saveNewAct()">Save Activity</button>
            </div>
            <div id="list-build"></div>
            <div id="list-drain"></div>
            <button class="btn-danger" onclick="wipeAllData()">WIPE ALL HISTORY</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="tab('dash', this)">Flow</div>
        <div class="nav-item" onclick="tab('day', this)">Day View</div>
        <div class="nav-item" onclick="tab('reports', this)">Reports</div>
        <div class="nav-item" onclick="tab('settings', this)">Settings</div>
    </nav>

    <script>
        let balance = parseFloat(localStorage.getItem('f_flow_balance')) || 0; 
        let history = JSON.parse(localStorage.getItem('f_flow_history')) || [];
        let activities = JSON.parse(localStorage.getItem('f_flow_final')) || [
            { name: "Deep Work", rate: 10, cat: "deposit" },
            { name: "Social Media", rate: -15, cat: "withdraw" }
        ];
        
        let viewingDate = new Date();
        const setNow = () => {
            const d = new Date();
            document.getElementById('start-time').value = d.getHours().toString().padStart(2, '0') + ":" + d.getMinutes().toString().padStart(2, '0');
        };
        setNow();

        function tab(p, el) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(ni => ni.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            el.classList.add('active');
            if(p === 'reports') renderReports();
            if(p === 'day') updateDayView();
            if(p === 'settings') refresh();
        }

        function executeLog() {
            const act = activities[document.getElementById('sel-act').value];
            const startTimeStr = document.getElementById('start-time').value;
            const h = parseFloat(document.getElementById('dur-hrs').value) || 0;
            const m = parseFloat(document.getElementById('dur-mins').value) || 0;
            const duration = h + (m/60);
            
            if(!startTimeStr || duration <= 0) return;

            balance = Math.max(-60, Math.min(balance + (act.rate * duration), 140));
            localStorage.setItem('f_flow_balance', balance);

            history.push({ 
                name: act.name, 
                duration: duration, 
                startTime: startTimeStr, 
                date: new Date().toISOString().split('T')[0], 
                cat: act.cat 
            });
            localStorage.setItem('f_flow_history', JSON.stringify(history));
            refresh();
            tab('day', document.querySelectorAll('.nav-item')[1]);
        }

        function updateDayView() {
            const dateStr = viewingDate.toISOString().split('T')[0];
            document.getElementById('day-date-label').innerText = viewingDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            const list = document.getElementById('timeline-list');
            list.innerHTML = '';
            
            let dayGrid = Array(24).fill(null);
            
            // Filter logs for selected day
            const logsForDay = history.filter(h => h.date === dateStr);
            
            logsForDay.forEach(log => {
                const [h, m] = log.startTime.split(':').map(Number);
                const startDec = h + (m/60);
                const endDec = startDec + log.duration;

                for(let i=0; i<24; i++) {
                    // Check if the activity overlaps with this hour block
                    if(startDec < (i + 1) && endDec > i) {
                        dayGrid[i] = log;
                    }
                }
            });

            for(let i=0; i<24; i++) {
                const log = dayGrid[i];
                list.innerHTML += `
                    <div class="hour-row">
                        <div class="h-time">${i}:00</div>
                        <div class="h-block ${log? (log.cat==='deposit'?'fill-deposit':'fill-withdraw'):''}">
                            ${log ? `${log.name} (${log.startTime})` : ''}
                        </div>
                    </div>`;
            }
        }

        function changeDay(offset) { viewingDate.setDate(viewingDate.getDate() + offset); updateDayView(); }

        function renderReports() {
            const pie = document.getElementById('pie-chart');
            const legend = document.getElementById('pie-legend');
            const centerText = document.getElementById('pie-center-text');
            let stats = {}; let total = 0; let buildTotal = 0; let drainTotal = 0;

            history.forEach(s => { 
                stats[s.name] = (stats[s.name]||0)+s.duration; 
                total += s.duration; 
                if(s.cat === 'deposit') buildTotal += s.duration; else drainTotal += s.duration;
            });

            if (total === 0) { pie.style.background = 'var(--empty)'; legend.innerHTML = ''; centerText.innerText = "Empty"; return; }
            
            let sorted = Object.entries(stats).sort((a,b) => {
                const catA = (history.find(h => h.name === a[0]) || {}).cat || 'deposit';
                const catB = (history.find(h => h.name === b[0]) || {}).cat || 'deposit';
                return catA === catB ? 0 : catA === 'deposit' ? -1 : 1;
            });

            let current = 0; let g = []; legend.innerHTML = '';
            sorted.forEach(([name, dur]) => {
                const item = history.find(h => h.name === name);
                const color = item && item.cat === 'withdraw' ? 'var(--withdraw)' : 'var(--accent)';
                const p = (dur/total)*100;
                g.push(`${color} ${current}% ${current+p}%`);
                current+=p;
                legend.innerHTML += `<div class="legend-item"><span><span style="width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:8px;background:${color}"></span>${name}</span><span style="font-weight:900;">${dur.toFixed(1)}h</span></div>`;
            });

            pie.style.background = `conic-gradient(${g.join(',')})`;
            centerText.innerHTML = `
                <div style="color:var(--accent)">BUILD: ${Math.round((buildTotal/total)*100)}%</div>
                <div style="color:var(--withdraw)">DRAIN: ${Math.round((drainTotal/total)*100)}%</div>
                <div style="margin-top:5px; opacity:0.6; font-size:0.6rem;">${total.toFixed(1)}h TOTAL</div>
            `;
        }

        function refresh() {
            localStorage.setItem('f_flow_final', JSON.stringify(activities));
            document.getElementById('disp-bal').innerText = Math.round(balance);
            const fill = document.getElementById('fill-bar');
            const ins = document.getElementById('insight-display');
            const visualPerc = ((balance + 60) / 200) * 100;
            fill.style.width = visualPerc + "%";
            
            let label = ""; let desc = "";
            if (balance >= 140) { fill.style.background = "var(--danger)"; label = "Critical"; desc = "System overload. Cooldown required."; } 
            else if (balance >= 115) { fill.style.background = "var(--danger)"; label = "Redlining"; desc = "Beyond sustainable capacity."; } 
            else if (balance >= 95) { fill.style.background = "var(--overheat)"; label = "Maximum"; desc = "Peak output. Monitor for burnout."; } 
            else if (balance >= 75) { fill.style.background = "var(--deposit)"; label = "Optimal"; desc = "Perfect flow. Keep this zone."; } 
            else if (balance >= 55) { fill.style.background = "var(--accent)"; label = "Stable"; desc = "Good efficiency. Keep it up."; } 
            else if (balance >= 35) { fill.style.background = "#64748b"; label = "Adequate"; desc = "Operational but losing momentum."; } 
            else if (balance >= 1) { fill.style.background = "#475569"; label = "Slacking"; desc = "System stagnant. Build now."; } 
            else if (balance === 0) { fill.style.background = "#1e293b"; label = "Void"; desc = "Zero momentum detected."; } 
            else { fill.style.background = "var(--withdraw)"; label = "Debt"; desc = "Actively destroying potential."; }
            
            ins.innerHTML = `<span class="status-label" style="color:${fill.style.background}">${label}</span><span class="status-desc">${desc}</span>`;
            document.getElementById('sel-act').innerHTML = activities.map((a, i) => `<option value="${i}">${a.name}</option>`).join('');
            
            const bList = document.getElementById('list-build'); const dList = document.getElementById('list-drain');
            bList.innerHTML = '<span class="cat-title">Build Activities</span>'; dList.innerHTML = '<span class="cat-title">Drain Activities</span>';
            activities.forEach((a, i) => {
                const html = `<div class="card" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;"><div><b>${a.name}</b><br><small>${a.rate} pts/hr</small></div><span style="color:#f87171; font-weight:800; cursor:pointer;" onclick="deleteAct(${i})">REMOVE</span></div>`;
                if(a.cat === 'deposit') bList.innerHTML += html; else dList.innerHTML += html;
            });
            updateDayView();
        }

        function saveNewAct() {
            const n = document.getElementById('in-name').value;
            const r = parseFloat(document.getElementById('in-rate').value);
            const c = document.getElementById('in-cat').value;
            if(n && !isNaN(r)) { activities.push({ name: n, rate: r, cat: c }); refresh(); document.getElementById('in-name').value = ''; document.getElementById('in-rate').value = ''; }
        }

        function deleteAct(i) { if(confirm(`Remove "${activities[i].name}"?`)) { activities.splice(i, 1); refresh(); } }

        function wipeAllData() { if(confirm("Wipe everything?")) { balance = 0; history = []; localStorage.clear(); location.reload(); } }

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('range-from').value = todayStr;
        document.getElementById('range-to').value = todayStr;
        refresh();
    </script>
</body>
</html>
